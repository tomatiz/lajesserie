<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>La Jesserie</title>
  <link rel="icon" type="image/png" href="favicon.png" />
  <meta property="og:title" content="La Jesserie" />
  <meta property="og:description" content="les perles aléatoires de Jesse" />
  <meta property="og:image" content="logo.png" />
  <meta property="og:type" content="website" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="La Jesserie" />
  <meta name="twitter:description" content="les perles aléatoires de Jesse" />
  <meta name="twitter:image" content="logo.png" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #f9f8f4;
      color: #1a1a18;
      min-height: 100vh;
      padding: 2rem 1rem 4rem;
    }

    .container {
      max-width: 640px;
      margin: 0 auto;
    }

    /* --- Header --- */
    .header {
      text-align: center;
      margin-bottom: 1.75rem;
    }

    .logo {
      max-width: 360px;
      width: 100%;
      height: auto;
      margin: 0 auto 0.5rem;
      display: block;
    }

    .subtitle {
      font-size: 1rem;
      color: #5f5e5a;
    }

    /* --- Mode tabs --- */
    .mode-tabs {
      display: flex;
      gap: 6px;
      justify-content: center;
      margin-bottom: 1.5rem;
    }

    .mode-tab {
      font-size: 0.9rem;
      padding: 0.5rem 1.25rem;
      border-radius: 20px;
      border: 1px solid #d3d1c7;
      background: #fff;
      color: #5f5e5a;
      cursor: pointer;
      transition: all 0.15s;
    }

    .mode-tab:hover { background: #f1efe8; color: #1a1a18; }

    .mode-tab.active {
      background: #1a1a18;
      color: #f9f8f4;
      border-color: #1a1a18;
    }

    /* --- Random mode --- */
    #mode-random {
      text-align: center;
    }

    .random-btn {
      font-size: 1rem;
      padding: 0.7rem 2rem;
      border-radius: 12px;
      border: 1px solid #d3d1c7;
      background: #fff;
      color: #1a1a18;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
    }

    .random-btn:hover { background: #f1efe8; }
    .random-btn:active { transform: scale(0.97); }

    #quote-box {
      display: none;
      margin: 0.75rem auto 0;
      background: #fff;
      border: 1px solid #e0ded6;
      border-radius: 14px;
      padding: 1.4rem 1.75rem;
      text-align: left;
      animation: fadeIn 0.3s ease;
    }

    #quote-text {
      font-size: 1.05rem;
      line-height: 1.7;
      color: #1a1a18;
    }

    /* --- Categories mode --- */
    #mode-categories { display: none; }

    .cat-filters {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      margin-bottom: 1.25rem;
    }

    .cat-btn {
      font-size: 0.82rem;
      padding: 4px 12px;
      border-radius: 20px;
      border: 1px solid #d3d1c7;
      background: #fff;
      color: #5f5e5a;
      cursor: pointer;
      transition: all 0.15s;
      white-space: nowrap;
    }

    .cat-btn:hover { background: #f1efe8; color: #1a1a18; }

    .cat-btn.active {
      background: #1a1a18;
      color: #f9f8f4;
      border-color: #1a1a18;
    }

    .cat-count {
      font-size: 0.75rem;
      opacity: 0.55;
      margin-left: 3px;
    }

    .quotes-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .quote-card {
      background: #fff;
      border: 1px solid #e0ded6;
      border-radius: 14px;
      padding: 1rem 1.25rem;
      animation: fadeIn 0.25s ease;
    }

    .quote-card-tag {
      display: inline-block;
      font-size: 0.72rem;
      font-weight: 500;
      padding: 2px 8px;
      border-radius: 8px;
      margin-bottom: 6px;
      letter-spacing: 0.02em;
      text-transform: uppercase;
    }

    .quote-card-text {
      font-size: 0.97rem;
      line-height: 1.65;
      color: #1a1a18;
    }

    /* Category colors */
    .tag-géographie   { background: #dceeff; color: #1a4f80; }
    .tag-logique      { background: #fef3d8; color: #7a4b00; }
    .tag-culture      { background: #ede9ff; color: #4a3da0; }
    .tag-chiffres     { background: #e2f5e2; color: #205c20; }
    .tag-people       { background: #fde8f0; color: #8c2250; }
    .tag-vie-pratique { background: #fde8e1; color: #7a2e10; }
    .tag-autre        { background: #f1efe8; color: #5f5e5a; }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <div class="container">

    <div class="header">
      <img class="logo" src="https://tomatiz.github.io/lajesserie/logo.png" alt="lajesserie.fr — les perles aléatoires de Jesse" />
    </div>

    <!-- Mode switcher -->
    <div class="mode-tabs">
      <button class="mode-tab active" onclick="setMode('random')">🎲 Aléatoire</button>
      <button class="mode-tab" onclick="setMode('categories')">📂 Par catégories</button>
    </div>

    <!-- Random mode -->
    <div id="mode-random">
      <div style="text-align:center">
        <button class="random-btn" onclick="showQuote()">🎲 Jesserie aléatoire</button>
      </div>
      <div id="quote-box">
        <p id="quote-text"></p>
      </div>
    </div>

    <!-- Categories mode -->
    <div id="mode-categories">
      <div class="cat-filters" id="cat-filters"></div>
      <div class="quotes-list" id="quotes-list"></div>
    </div>

  </div>

  <script>
    const quotes = [
      { t: "Clocharde avec 80 000 € dans son sac de sport", c: "people" },
      { t: "Il s'appelle Grégoire Leroux et il est roux, son nom de famille c'est Leroux — Putain ses parents, ils l'aimaient pas", c: "people" },
      { t: "La taille moyenne des voitures est d'environ 2,30 m", c: "chiffres" },
      { t: "L'épaisseur des cheveux des Asiatiques est de 0,7 mm", c: "chiffres" },
      { t: "Vol au karaté", c: "logique" },
      { t: "Parachute ascenseur", c: "logique" },
      { t: "Il y a des aimants dans la roulette au casino", c: "logique" },
      { t: "La meuf, elle a pas pu t'envoyer un Snap, elle avait laissé son téléphone en Angleterre — Mais si elle avait du Wi-Fi", c: "logique" },
      { t: "C'est la mère qui transmet la calvitie", c: "culture" },
      { t: "C'est pas du Viandox, c'est du Maggi", c: "culture" },
      { t: "Le Caire, c'est la ville la plus dense d'Europe", c: "géographie" },
      { t: "J'ai touché 15 000 bites sur la poubelle", c: "autre" },
      { t: "Tu vois Luis Silva ? — Non c'est pas ça. — Euh non, Thiago Luis !!", c: "people" },
      { t: "Eh, ton téléphone, il a changé de couleur ? Il était pas noir avant ?", c: "logique" },
      { t: "Pour l'Orchestre national de Lille, on se rejoint à quelle heure à l'audito du lycée ?", c: "géographie" },
      { t: "Je suis vietnamien, ça se voit à la bridation", c: "people" },
      { t: "Perrine qui raconte une blague sur Prudence : Elle dit 'On va prendre un pack d'eau pour pas être désaltéré' — Jesse : 'Quoi ? Un PACK D'EAU !'", c: "people" },
      { t: "Regarde Jesse, il lui ressemble trop (à Cauet) — Ahah Sirius Black !!", c: "culture" },
      { t: "Ouais, tu vois, elle driver — Ah ouais elle meurt dans le 1 — Non dans le 2 — Ah je suis déjà au 2 — Non mais sur Netflix ça défile tout seul, j'ai été pisser, c'est passé au 2", c: "logique" },
      { t: "Manzana, vodka, je les mélange ensemble", c: "vie-pratique" },
      { t: "Au restaurant de la tour Eiffel, tu peux manger de la bite de cochon", c: "géographie" },
      { t: "Le jour où je suis comme ça, je t'autorise à me suicider", c: "autre" },
      { t: "Guinness détient 50 % du marché africain — Forcément c'est une bière noire !", c: "logique" },
      { t: "Debout la France, tu as été Thomas en plus — Jesse confond Nuit debout et Debout la France : 'C'est bon, il y a debout dedans'", c: "culture" },
      { t: "Les notaires, normalement, ils ont un bunker pour faire face aux inondations !", c: "logique" },
      { t: "Il a oublié 20 balles dans un distributeur", c: "vie-pratique" },
      { t: "Selon Jesse, pour la prière c'est toujours 12° Est pour la Mecque, où que tu sois dans le monde.", c: "géographie" },
      { t: "Tu vois le logo pigeon de Rolls-Royce — Euh mec, leur logo c'est un ange", c: "culture" },
      { t: "Mec, tu t'en souviens quand on faisait des triples 21 aux fléchettes", c: "autre" },
      { t: "Tu vois la montagne — Ouais mais Jesse peut pas connaître la montagne. — Jesse : Mais si je connais Hodor", c: "culture" },
      { t: "Jesse très sérieux : Ils étaient combien les Jackson Five déjà ? — Bah five", c: "culture" },
      { t: "Le corbeau et le rossignol", c: "culture" },
      { t: "Le Corniaud c'est une pièce de Molière", c: "culture" },
      { t: "La Croisette s'amuse", c: "autre" },
      { t: "Le Maroc est toujours sous le protectorat français", c: "géographie" },
      { t: "Jesse, il met son four en mode ventilo", c: "vie-pratique" },
      { t: "Elle est sèche comme le Niagara", c: "logique" },
      { t: "Il y a du gaz dans l'eau", c: "logique" },
      { t: "Claude François est mort à côté de sa baignoire", c: "culture" },
      { t: "Il a envoyé à Flore 'T'es la plus bonne bonne de mes copines !' avec Siri à la place de Flo, sauf qu'il était en froid depuis 6 mois avec Flore !", c: "people" },
      { t: "Une glacière chauffante", c: "logique" },
      { t: "C'est forcément quelque part", c: "logique" },
      { t: "Il avait la petite larme au front", c: "autre" },
      { t: "Moi j'étais au collège jusqu'à ma 3e", c: "logique" },
      { t: "Ils viennent directement à l'hôpital du gamin pour le déclarer, plus besoin d'aller à la mairie", c: "vie-pratique" },
      { t: "Pour regarder une éclipse c'est des lunettes 3D", c: "vie-pratique" },
      { t: "Ah la ville de Troyes, la ville troglodyte, moi je connais, il y avait Hélène de Troie (Troyes)", c: "géographie" },
      { t: "Nadal il a de la barbe sur son épaule", c: "people" },
    ];

    const CAT_LABELS = {
      "tout":        "Tout",
      "géographie":  "Géographie",
      "logique":     "Logique imparable",
      "culture":     "Culture générale",
      "chiffres":    "Chiffres & mesures",
      "people":      "Les gens",
      "vie-pratique":"Vie pratique",
      "autre":       "Autre",
    };

    // --- Random mode ---
    let lastIndex = -1;
    function showQuote() {
      let idx;
      do { idx = Math.floor(Math.random() * quotes.length); } while (idx === lastIndex && quotes.length > 1);
      lastIndex = idx;
      const box = document.getElementById('quote-box');
      const text = document.getElementById('quote-text');
      text.textContent = quotes[idx].t;
      box.style.display = 'none';
      void box.offsetWidth;
      box.style.display = 'block';
      box.style.animation = 'none';
      void box.offsetWidth;
      box.style.animation = 'fadeIn 0.3s ease';
    }

    // --- Mode switcher ---
    function setMode(mode) {
      document.getElementById('mode-random').style.display     = mode === 'random'     ? 'block' : 'none';
      document.getElementById('mode-categories').style.display = mode === 'categories' ? 'block' : 'none';
      document.querySelectorAll('.mode-tab').forEach((btn, i) => {
        btn.classList.toggle('active', (i === 0) === (mode === 'random'));
      });
      if (mode === 'categories') renderCategories();
    }

    // --- Categories mode ---
    let activeFilter = 'tout';

    function renderCategories() {
      renderFilters();
      renderQuotes();
    }

    function renderFilters() {
      const cats = ['tout', ...Object.keys(CAT_LABELS).filter(k => k !== 'tout')];
      const container = document.getElementById('cat-filters');
      container.innerHTML = cats.map(c => {
        const count = c === 'tout' ? quotes.length : quotes.filter(q => q.c === c).length;
        if (c !== 'tout' && count === 0) return '';
        return `<button class="cat-btn${activeFilter === c ? ' active' : ''}" onclick="setFilter('${c}')">
          ${CAT_LABELS[c]}<span class="cat-count">${count}</span>
        </button>`;
      }).join('');
    }

    function renderQuotes() {
      const filtered = activeFilter === 'tout' ? quotes : quotes.filter(q => q.c === activeFilter);
      const container = document.getElementById('quotes-list');
      container.innerHTML = filtered.map(q => `
        <div class="quote-card">
          <span class="quote-card-tag tag-${q.c}">${CAT_LABELS[q.c] || q.c}</span>
          <div class="quote-card-text">${q.t}</div>
        </div>
      `).join('');
    }

    function setFilter(cat) {
      activeFilter = cat;
      renderFilters();
      renderQuotes();
    }
  </script>
</body>
</html>
