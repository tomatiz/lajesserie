  <title>La Jesserie</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #f9f8f4;
      color: #1a1a18;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    .container { text-align: center; max-width: 640px; width: 100%; }
    .logo {
      max-width: 360px;
      width: 100%;
      height: auto;
      margin: 0 auto 2rem;
      display: block;
    }
    .subtitle {
      font-size: 1rem;
      color: #5f5e5a;
      margin-bottom: 1.25rem;
    }
    button {
      font-size: 1rem;
      padding: 0.7rem 2rem;
      border-radius: 12px;
      border: 1px solid #d3d1c7;
      background: #fff;
      color: #1a1a18;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
    }
    button:hover { background: #f1efe8; }
    button:active { transform: scale(0.97); }
    #quote-box {
      display: none;
      margin: 2rem auto 0;
      background: #fff;
      border: 1px solid #e0ded6;
      border-radius: 14px;
      padding: 1.4rem 1.75rem;
      text-align: left;
      animation: fadeIn 0.3s ease;
    }
    #quote-text {
      font-size: 1.05rem;
      line-height: 1.7;
      color: #1a1a18;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
