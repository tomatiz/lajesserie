<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lajesserie.fr</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #f9f8f4;
      color: #1a1a18;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    .container { text-align: center; max-width: 640px; width: 100%; }
    h1 {
      font-size: 2.4rem;
      font-weight: 600;
      letter-spacing: -0.5px;
      margin-bottom: 0.2rem;
    }
    .tagline {
      font-size: 0.95rem;
      color: #888780;
      margin-bottom: 2rem;
    }
    .subtitle {
      font-size: 1rem;
      color: #5f5e5a;
      margin-bottom: 1.25rem;
    }
    button {
      font-size: 1rem;
      padding: 0.7rem 2rem;
      border-radius: 12px;
      border: 1px solid #d3d1c7;
      background: #fff;
      color: #1a1a18;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
    }
    button:hover { background: #f1efe8; }
    button:active { transform: scale(0.97); }
    #quote-box {
      display: none;
      margin: 2rem auto 0;
      background: #fff;
      border: 1px solid #e0ded6;
      border-radius: 14px;
      padding: 1.4rem 1.75rem;
      text-align: left;
      animation: fadeIn 0.3s ease;
    }
    #quote-text {
      font-size: 1.05rem;
      line-height: 1.7;
      color: #1a1a18;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Lajesserie.fr</h1>
    <p class="tagline">le savoir Jessien, réuni en un seul endroit</p>
    <p class="subtitle">Cliquez ici pour avoir une Jesserie aléatoire</p>
    <button onclick="showQuote()">🎲 Jesserie aléatoire</button>
    <div id="quote-box">
      <p id="quote-text"></p>
    </div>
  </div>

  <script>
    const quotes = [
      "Clocharde avec 80 000 € dans son sac de sport",
"Il s'appelle Grégoire Leroux et il est roux, son nom de famille c'est Leroux — Putain ses parents, ils l'aimaient pas",
"La taille moyenne des voitures est d'environ 2,30 m",
"L'épaisseur des cheveux des Asiatiques est de 0,7 mm",
"Vol au karaté",
"Parachute ascenseur",
"Il y a des aimants dans la roulette au casino",
"La meuf, elle a pas pu t'envoyer un Snap, elle avait laissé son téléphone en Angleterre — Mais si elle avait du Wi-Fi",
"C'est la mère qui transmet la calvitie",
"C'est pas du Viandox, c'est du Maggi",
"Le Caire, c'est la ville la plus dense d'Europe",
"J'ai touché 15 000 bites sur la poubelle",
"Tu vois Luis Silva ? — Non c'est pas ça. — Euh non, Thiago Luis !!",
"Eh, ton téléphone, il a changé de couleur ? Il était pas noir avant ?",
"Pour l'Orchestre national de Lille, on se rejoint à quelle heure à l'audito du lycée ?",
"Je suis vietnamien, ça se voit à la bridation",
"Perrine qui raconte une blague sur Prudence : Elle dit 'On va prendre un pack d'eau pour pas être désaltéré' — Jesse : 'Quoi ? Un PACK D'EAU !'",
"Regarde Jesse, il lui ressemble trop (à Cauet) — Ahah Sirius Black !!",
"Ouais, tu vois, elle drive — Ah ouais elle meurt dans le 1 — Non dans le 2 — Ah je suis déjà au 2 — Non mais sur Netflix ça défile tout seul, j'ai été pisser, c'est passé au 2",
"Manzana, vodka, je les mélange ensemble",
"Au restaurant de la tour Eiffel, tu peux manger de la bite de cochon",
"Le jour où je suis comme ça, je t'autorise à me suicider",
"Guinness détient 50 % du marché africain — Forcément c'est une bière noire !",
"Debout la France, tu as été Thomas en plus — Jesse confond Nuit debout et Debout la France : 'C'est bon, il y a debout dedans'",
"Les notaires, normalement, ils ont un bunker pour faire face aux inondations !",
"Il a oublié 20 balles dans un distributeur",
"Selon Jesse, pour la prière c'est toujours 12° Est pour la Mecque, où que tu sois dans le monde.",
"Tu vois le logo pigeon de Rolls-Royce — Euh mec, leur logo c'est un ange",
"Mec, tu t'en souviens quand on faisait des triples 21 aux fléchettes",
"Tu vois la montagne — Ouais mais Jesse peut pas connaître la montagne. — Jesse : Mais si je connais Hodor",
"Jesse très sérieux : Ils étaient combien les Jackson Five déjà ? — Bah five",
"Le corbeau et le rossignol",
"Le Corniaud c'est une pièce de Molière",
"La Croisette s'amuse",
"Le Maroc est toujours sous le protectorat français",
"Jesse, il met son four en mode ventilo",
"Elle est sèche comme le Niagara",
"Il y a du gaz dans l'eau",
"Claude François est mort à côté de sa baignoire",
"Il a envoyé à Flore 'T'es la plus bonne bonne de mes copines !' avec Siri à la place de Flo, sauf qu'il était en froid depuis 6 mois avec Flore !",
"Une glacière chauffante",
"C'est forcément quelque part",
"Il avait la petite larme au front",
"Moi j'étais au collège jusqu'à ma 3e",
"Ils viennent directement à l'hôpital du gamin pour le déclarer, plus besoin d'aller à la mairie",
"Pour regarder une éclipse c'est des lunettes 3D",
"Ah la ville de Troyes, la ville troglodyte, moi je connais, il y avait Hélène de Troie (Troyes)"
    ];

    let lastIndex = -1;
    function showQuote() {
      let idx;
      do { idx = Math.floor(Math.random() * quotes.length); } while (idx === lastIndex && quotes.length > 1);
      lastIndex = idx;
      const box = document.getElementById('quote-box');
      const text = document.getElementById('quote-text');
      text.textContent = quotes[idx];
      box.style.display = 'none';
      void box.offsetWidth;
      box.style.display = 'block';
      box.style.animation = 'none';
      void box.offsetWidth;
      box.style.animation = 'fadeIn 0.3s ease';
    }
  </script>
</body>
</html>
